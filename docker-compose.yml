services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: medcorvis-sqlserver
    environment:
      SA_PASSWORD: "MedCorVis_Dev_2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - medcorvis_sqlserver_data:/var/opt/mssql

  seq:
    image: datalust/seq:latest
    container_name: medcorvis-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "True"
    ports:
      - "5341:80"
    volumes:
      - medcorvis_seq_data:/data
      
volumes:
  medcorvis_sqlserver_data:
  medcorvis_seq_data: